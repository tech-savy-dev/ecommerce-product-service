image:
  file: .gitpod.Dockerfile

tasks:
  - name: Init & Build
    init: ./mvnw clean install -DskipTests
    command: ./mvnw spring-boot:run

ports:
  - port: 8080
    onOpen: open-preview
    visibility: public

vscode:
  extensions:
    - vscjava.vscode-java-pack
    - Pivotal.vscode-spring-boot
    - redhat.vscode-xml
    - eamodio.gitlens
    - github.copilot

# Optional: Prebuilds
# https://www.gitpod.io/docs/prebuilds
# Enable if you want faster workspace start times
# github:
#   prebuilds:
#     master: true
#     branches: true
#     pullRequests: true
#     addCheck: true
